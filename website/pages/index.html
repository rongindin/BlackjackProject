<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackjack Pro</title>
  <link rel="stylesheet" href="index.css"/>
</head>

<body>

  <div class="table">

    <div class="topbar">
      <div class="title">BLACKJACK</div>

      <div class="stats">
        <div>Balance: $<span id="balance">1000</span></div>
        <div>Bet: $<span id="bet">0</span></div>
      </div>
    </div>

    <div class="game-area">

      <div class="dealer">
        <h2>Dealer</h2>
        <div id="dealerCards" class="cards"></div>
        <div class="score">Score: <span id="dealerScore">0</span></div>
      </div>

      <div class="player">
        <h2>Player</h2>
        <div id="playerCards" class="cards"></div>
        <div class="score">Score: <span id="playerScore">0</span></div>
      </div>

    </div>

    <div class="betting-panel">
      <button class="bet" data-value="10">+10</button>
      <button class="bet" data-value="50">+50</button>
      <button class="bet" data-value="100">+100</button>

      <button id="clearBet">Clear Bet</button>
      <button id="confirmBtn">Deal</button>
      <div class="custom-bet">
  <input id="customBetInput" type="number" placeholder="Custom bet" min="1" />
  <button id="addCustomBet">Add Bet</button>
</div>
    </div>

    <div class="actions">
      <button id="hitBtn">Hit</button>
      <button id="standBtn">Stand</button>
    </div>

  </div>

  <div id="stats"></div>

  <script src="index.js"></script>
</body>
</html>
