<!DOCTYPE html>
<html lang="en">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blackjack</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <!-- DEALER (TOP) -->
  <section class="dealer">
    <h2>Dealer</h2>
    <div id="dealerCards" class="cards"></div>
    <div>Dealer Score: <span id="dealerScore">0</span></div>
  </section>

  <hr />

  <!-- PLAYER (BOTTOM) -->
  <section class="player">
    <h2>Player</h2>
    <div id="playerCards" class="cards"></div>
    <div>Player Score: <span id="playerScore">0</span></div>
  </section>

  <hr />

  <!-- GAME INFO -->
  <div class="info">
    <div>Balance: <span id="balance">1000</span></div>
    <div>Bet: <span id="bet">0</span></div>
  </div>

  <!-- BET BUTTONS -->
  <div class="bets">
    <button class="bet" data-value="10">+10</button>
    <button class="bet" data-value="50">+50</button>
    <button class="bet" data-value="100">+100</button>
    <button id="clearBet">Clear Bet</button>
  </div>

  <!-- GAME CONTROLS -->
  <div class="controls">
    <button id="confirmBtn">Deal</button>
    <button id="hitBtn">Hit</button>
    <button id="standBtn">Stand</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
